<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO CRUD con LocalStorage</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="app-container">
    <section class="todo-panel">
      <header class="panel-header">
        <h1>Lista de Tareas</h1>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Cambiar tema">
          🌙
        </button>
      </header>
      <form id="todo-form" class="todo-form">
        <input type="text" id="todo-input" placeholder="Escribe una tarea..." maxlength="100" autocomplete="off">
        <button type="submit">Agregar</button>
      </form>
      <div id="message" class="message"></div>
      <ul id="todo-list" class="todo-list"></ul>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
